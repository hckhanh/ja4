# Fires a repository_dispatch event whenever docs or source files change
# on merge to main. This triggers the skill staleness check workflow.
#
name: Trigger Skill Review

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"

permissions: {}

jobs:
  notify:
    name: Trigger Skill Review
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Collect changed files
        id: changes
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          FILES=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Dispatch to intent repo
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          event-type: "skill-check"
          client-payload: |
            {
              "package": "@hckhanh/ja4",
              "sha": "${{ github.sha }}",
              "changed_files": ${{ steps.changes.outputs.files }}
            }
