name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "lts"
          cache: true
          registry-url: "https://registry.npmjs.org"

      - run: vp install

      - name: Lint & format check
        run: vp check

      - name: Test
        run: vp test

      - name: Build
        run: vp pack

      - name: Publish to npm
        run: pnpm publish --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
